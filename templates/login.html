<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Parcel Service</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f8; font-family: Arial, sans-serif; }

    .login-card {
      max-width: 460px;
      margin: 60px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 36px;
    }

    h4 { color: #1a3c5e; font-weight: bold; text-align: center; margin-bottom: 24px; }

    /* Toggle buttons */
    .toggle-wrap {
      display: flex;
      background: #f0f4f8;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .toggle-btn {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #6c757d;
      transition: all 0.2s;
      user-select: none;
    }

    .toggle-btn.active {
      background: #1a3c5e;
      color: #fff;
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    .btn-login {
      background-color: #1a3c5e;
      color: white;
      width: 100%;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 15px;
      margin-top: 4px;
    }

    .btn-login:hover { background-color: #14304d; color: white; }

    .btn-signup {
      width: 100%;
      border-radius: 6px;
      padding: 9px;
      font-size: 14px;
    }

    hr { margin: 20px 0; }
    .section-label { font-size: 13px; color: #6c757d; text-align: center; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="login-card">
  <h4>&#128230; Parcel Service Login</h4>

  {% if error %}
  <div class="alert alert-{{ 'danger' if 'successful' not in error else 'success' }} py-2" style="font-size:13px">
    {{ error }}
  </div>
  {% endif %}

 <div class="toggle-wrap">
    <div class="toggle-btn active" id="tab-admin" onclick="switchTab('admin')">&#128274; Admin</div>
    <div class="toggle-btn" id="tab-delivery" onclick="switchTab('delivery')">&#128666; Delivery</div>
    <div class="toggle-btn" id="tab-customer" onclick="switchTab('customer')">&#128100; Customer</div>
  </div>

  <div class="panel active" id="panel-admin">
    <form method="POST" action="/login">
      <input type="hidden" name="role_type" value="admin">
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Staff ID</label>
        <input type="text" name="username" class="form-control" placeholder="Enter Staff ID" required>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn-login btn">Login as Admin</button>
    </form>
  </div>

  <div class="panel" id="panel-delivery">
    <form method="POST" action="/login">
      <input type="hidden" name="role_type" value="delivery">
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Driver Phone / ID</label>
        <input type="text" name="username" class="form-control" placeholder="Enter Driver ID" required>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn-login btn">Login as Delivery Partner</button>
    </form>
  </div>

  <div class="panel" id="panel-customer">
    <form method="POST" action="/login">
      <input type="hidden" name="role_type" value="customer">
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Phone Number</label>
        <input type="text" name="username" class="form-control" placeholder="Enter 10-digit phone number" required>
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-size:14px">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn-login btn">Login as Customer</button>
    </form>

    <hr>
    <p class="section-label">New here? Register as a customer</p>
    <form method="POST" action="/user_signup">
      <div class="mb-2"><input type="text" name="name" class="form-control" placeholder="Full Name" required style="font-size:14px"></div>
      <div class="mb-2"><input type="text" name="phone" class="form-control" placeholder="Phone Number (10 digits)" required style="font-size:14px"></div>
      <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Set Password" required style="font-size:14px"></div>
      <button type="submit" class="btn btn-outline-success btn-signup">Register as Customer</button>
    </form>
  </div>
</div>

<script>
  function switchTab(tab) {
    // Hide all panels
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

    // Show selected panel
    document.getElementById("panel-" + tab).classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
  }
</script>

</body>
</html>
